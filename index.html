<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>The Gottdank Tree</title>
<meta name="description" content="One rare name — the Gottdank family, from a Galician shtetl to six countries across three centuries. Walk the tree and read their stories.">
<meta name="theme-color" content="#17130E">
<link rel="icon" type="image/svg+xml" href="img/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png">
<link rel="apple-touch-icon" href="img/apple-touch-icon.png">
<meta property="og:type" content="website">
<meta property="og:site_name" content="The Gottdank Tree">
<meta property="og:title" content="The Gottdank Tree">
<meta property="og:description" content="One rare name — from a Galician shtetl to six countries, across three centuries. Walk the family and read their stories.">
<meta property="og:url" content="https://colegottdank.github.io/gottdank-tree/">
<meta property="og:image" content="https://colegottdank.github.io/gottdank-tree/img/og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="The Gottdank Tree">
<meta name="twitter:description" content="One rare name — from a Galician shtetl to six countries, across three centuries.">
<meta name="twitter:image" content="https://colegottdank.github.io/gottdank-tree/img/og.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gloock&family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#17130E; --wall:#1E1912; --card:#272014; --card2:#2E2619;
    --linen:#F2E9D5; --linen-dim:#BDB094;
    --gold:#CFAC63; --gold-hi:#F1DCA4; --gold-dim:rgba(207,172,99,.36);
    --text:#E9DFC6;
    --ember:#A6402F; --sage:#8FA377; --pencil:#8A7F6B;
    --hair:rgba(237,227,205,.09);
    --serif:'Newsreader',Georgia,serif;
    --disp:'Gloock',Georgia,serif;
    --mono:'Spline Sans Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
  [id]{scroll-margin-top:76px}
  body{background:var(--ink);color:var(--linen);font-family:var(--serif);font-size:18px;line-height:1.62;
    -webkit-font-smoothing:antialiased;overflow-wrap:break-word}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(90% 55% at 50% -6%, rgba(239,217,160,.07), transparent 60%)}
  ::selection{background:var(--gold);color:var(--ink)}
  a{color:var(--gold-hi)}
  button{font-family:inherit;color:inherit}
  :focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  img{max-width:100%}

  .shell{max-width:1060px;margin:0 auto;padding:0 22px;position:relative;z-index:1}

  /* ============ top bar ============ */
  .top{position:sticky;top:0;z-index:50;background:rgba(23,19,14,.86);backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--hair)}
  .toprow{display:flex;align-items:center;gap:14px;height:56px}
  .wordmark{background:none;border:none;cursor:pointer;font-family:var(--disp);font-size:17px;color:var(--linen);
    letter-spacing:.02em;white-space:nowrap;display:flex;align-items:baseline;gap:8px}
  .wordmark em{font-family:var(--mono);font-style:normal;font-size:8.5px;letter-spacing:.22em;color:var(--gold);text-transform:uppercase}
  .navtabs{display:flex;gap:2px;margin-left:6px}
  .ntab{background:none;border:none;cursor:pointer;font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--linen-dim);padding:8px 11px;border-radius:4px}
  .ntab:hover{color:var(--linen)}
  .ntab.on{color:var(--gold-hi);background:rgba(201,167,95,.1)}
  .topsearch{position:relative;margin-left:auto;flex:0 1 250px;min-width:0}
  .topsearch input{width:100%;background:rgba(237,227,205,.05);border:1px solid var(--hair);border-radius:999px;
    color:var(--linen);font-family:var(--mono);font-size:11.5px;padding:8px 13px 8px 30px;letter-spacing:.02em}
  .topsearch input::placeholder{color:var(--linen-dim)}
  .topsearch input:focus{outline:none;border-color:var(--gold-dim);background:rgba(237,227,205,.08)}
  .topsearch svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:13px;height:13px;opacity:.55}
  .findpop{position:absolute;right:0;left:auto;min-width:290px;top:calc(100% + 8px);z-index:60;background:var(--card);
    border:1px solid var(--gold-dim);border-radius:10px;box-shadow:0 18px 40px -12px rgba(0,0,0,.7);overflow:hidden;max-height:60vh;overflow-y:auto}
  .findpop button{display:flex;align-items:baseline;gap:10px;width:100%;text-align:left;background:none;border:none;
    border-bottom:1px solid var(--hair);padding:10px 14px;cursor:pointer}
  .findpop button:last-child{border-bottom:none}
  .findpop button:hover{background:rgba(201,167,95,.08)}
  .findpop .fpn{font-size:15px;font-weight:500}
  .findpop .fpm{font-family:var(--mono);font-size:9.5px;color:var(--linen-dim);margin-left:auto;white-space:nowrap}
  .cbtn{flex:none;border:1px solid var(--gold-dim);background:none;color:var(--gold-hi);cursor:pointer;
    width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;border-radius:50%}
  .cbtn:hover{background:rgba(201,167,95,.12)}
  .cbtn svg{width:14px;height:14px}

  .view[hidden]{display:none}

  /* ============ hero ============ */
  .hero{min-height:calc(100svh - 56px);display:flex;flex-direction:column;justify-content:center;align-items:center;
    text-align:center;padding:64px 20px 0;position:relative}
  .hero .quot{font-family:var(--mono);font-size:10px;letter-spacing:.34em;text-transform:uppercase;color:var(--gold)}
  .hero h1{font-family:var(--disp);font-weight:400;font-size:clamp(58px,12.5vw,148px);line-height:.94;
    letter-spacing:.005em;margin:18px 0 8px;color:var(--linen)}
  .hero .mean{font-size:clamp(17px,2.4vw,22px);font-style:italic;color:var(--linen-dim);max-width:34em;line-height:1.5}
  .hero .mean b{color:var(--linen);font-style:italic;font-weight:500}
  .herostats{display:flex;gap:0;margin:34px 0 38px;border-top:1px solid var(--hair);border-bottom:1px solid var(--hair)}
  .herostats div{padding:12px 26px;border-right:1px solid var(--hair)}
  .herostats div:last-child{border-right:none}
  .herostats b{display:block;font-family:var(--disp);font-weight:400;font-size:26px;color:var(--gold-hi)}
  .herostats span{font-family:var(--mono);font-size:8.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--linen-dim)}
  .heroctas{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  .btn{display:inline-flex;align-items:center;gap:9px;border-radius:999px;padding:13px 24px;cursor:pointer;
    font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;text-decoration:none}
  .btn.gold{background:var(--gold);border:1px solid var(--gold);color:#171106;font-weight:500}
  .btn.gold:hover{background:var(--gold-hi);border-color:var(--gold-hi)}
  .btn.ghost{background:none;border:1px solid var(--gold-dim);color:var(--gold-hi)}
  .btn.ghost:hover{border-color:var(--gold);background:rgba(201,167,95,.08)}
  .herothread{width:1px;height:74px;margin-top:44px;background:linear-gradient(var(--gold), transparent);position:relative}
  .herothread::before{content:"";position:absolute;top:-5px;left:50%;transform:translateX(-50%);width:7px;height:7px;
    border-radius:50%;background:var(--gold-hi);box-shadow:0 0 14px 2px rgba(239,217,160,.5)}

  /* ============ saga chapters + the thread ============ */
  .saga{padding-bottom:40px}
  .chapter{position:relative;padding:74px 0 30px 74px;max-width:820px;margin:0 auto}
  .chapter::before{content:"";position:absolute;left:26px;top:0;bottom:0;width:1px;
    background:linear-gradient(rgba(201,167,95,.5), rgba(201,167,95,.22))}
  .chapter:last-of-type::before{background:linear-gradient(rgba(201,167,95,.5), transparent 88%)}
  .tick{position:absolute;left:26px;top:86px;transform:translate(-50%,-50%);width:11px;height:11px;border-radius:50%;
    background:var(--ink);border:2px solid var(--gold);box-shadow:0 0 0 4px var(--ink), 0 0 16px rgba(201,167,95,.45)}
  .chapter.memorial .tick{border-color:var(--ember);box-shadow:0 0 0 4px var(--ink), 0 0 16px rgba(166,64,47,.5)}
  .era{font-family:var(--mono);font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);display:block}
  .chnum{position:absolute;left:-8px;top:64px;font-family:var(--disp);font-size:15px;color:var(--gold);width:44px;text-align:center;
    transform:translateX(-50%);left:26px;top:auto}
  .chapter h2{font-family:var(--disp);font-weight:400;font-size:clamp(34px,5.6vw,52px);line-height:1.04;margin:10px 0 6px;color:var(--linen)}
  .lede{font-size:19.5px;font-style:italic;color:#CDC0A3;max-width:34em;line-height:1.55;margin-bottom:22px}
  .prose{max-width:62ch}
  .prose p{margin-bottom:16px;font-size:18.5px;font-weight:400;line-height:1.72;color:var(--text)}
  .prose p:first-of-type::first-letter{font-family:var(--disp);font-size:52px;line-height:.82;float:left;
    padding:6px 9px 0 0;color:var(--gold-hi)}
  .chapter.memorial h2{color:#E8CFC2}

  .artifact{margin:26px 0 8px;border:1px solid rgba(201,167,95,.28);background:#0F0C08;padding:9px;max-width:640px}
  .artifact img{display:block;width:100%;filter:sepia(.28) saturate(.82) contrast(.96) brightness(.92)}
  .artifact figcaption{font-family:var(--mono);font-size:9.5px;letter-spacing:.04em;line-height:1.55;color:var(--linen-dim);
    padding:9px 4px 2px}
  .artrow{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:760px}
  @media (max-width:640px){.artrow{grid-template-columns:1fr}}

  .grouplbl{font-family:var(--mono);font-size:9.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);
    margin:30px 0 12px;display:flex;align-items:center;gap:12px}
  .grouplbl::after{content:"";flex:1;height:1px;background:var(--hair);max-width:180px}
  .rail{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:10px;margin:14px 0 6px}
  @media (max-width:560px){.rail{display:flex;overflow-x:auto;scroll-snap-type:x proximity;padding-bottom:8px;margin-right:-22px;padding-right:22px}
    .rail::-webkit-scrollbar{display:none}
    .rail .cameo{flex:0 0 218px;scroll-snap-align:start}}
  .cameo{display:flex;align-items:center;gap:11px;text-align:left;background:var(--card);border:1px solid var(--hair);
    border-radius:11px;padding:11px 13px;cursor:pointer;transition:border-color .15s, transform .15s, background .15s}
  .cameo:hover{border-color:var(--gold-dim);background:var(--card2);transform:translateY(-2px)}
  .pic{position:relative;width:46px;height:46px;flex:none;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:#161209;border:1.5px solid var(--gold);overflow:hidden}
  .pic img{width:100%;height:100%;object-fit:cover;filter:sepia(.2) saturate(.85)}
  .pic .mono{font-family:var(--disp);font-size:15px;color:var(--gold)}
  .likely>.pic, .pic.likely{border-color:var(--sage)} .likely>.pic .mono, .pic.likely .mono{color:var(--sage)}
  .unconfirmed>.pic, .pic.unconfirmed{border-style:dashed;border-color:var(--pencil)}
  .unconfirmed>.pic .mono, .pic.unconfirmed .mono{color:var(--pencil)}
  .cameo .cx{min-width:0}
  .cameo .cn{display:block;font-size:15.5px;font-weight:500;line-height:1.2;color:var(--linen)}
  .cameo .cm{display:block;font-family:var(--mono);font-size:9.5px;letter-spacing:.04em;color:var(--linen-dim);margin-top:3px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* vignette pull-quotes on the thread */
  .vig{margin:38px 0 10px;max-width:560px;position:relative;padding:4px 0 0 26px}
  .vig::before{content:"„";position:absolute;left:-6px;top:-4px;font-family:var(--disp);font-size:56px;color:var(--gold);line-height:1}
  .vig p{font-size:21px;font-style:italic;line-height:1.55;color:var(--linen)}
  .vig button{background:none;border:none;cursor:pointer;font-family:var(--mono);font-size:9.5px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--gold);margin-top:12px;padding:2px 0;border-bottom:1px dotted var(--gold-dim)}
  .vig button:hover{color:var(--gold-hi)}

  /* memorial block */
  .yizkor{margin:26px 0 6px;max-width:640px;border:1px solid rgba(166,64,47,.45);background:
    radial-gradient(120% 130% at 50% -20%, rgba(166,64,47,.16), rgba(166,64,47,.04));padding:22px 24px;border-radius:3px}
  .yizkor b{display:block;font-family:var(--mono);font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:#D28A75;margin-bottom:12px}
  .yizkor ul{list-style:none}
  .yizkor li{font-size:17px;font-style:italic;color:#E6D3C4;padding:7px 0;border-bottom:1px dashed rgba(166,64,47,.25);line-height:1.45}
  .yizkor li:last-child{border-bottom:none}
  .yizkor li span{font-family:var(--mono);font-style:normal;font-size:9.5px;color:#B08573;letter-spacing:.06em;display:block;margin-top:2px}
  .yizkor .zl{font-family:var(--mono);font-size:9px;letter-spacing:.2em;color:#B08573;text-transform:uppercase;margin-top:14px;display:block}

  /* ============ finale: constellation map + timeline ============ */
  .finale{padding:70px 0 20px}
  .finale .shell{max-width:900px}
  .fin-h{text-align:center;margin-bottom:8px}
  .fin-h h2{font-family:var(--disp);font-weight:400;font-size:clamp(32px,5vw,46px)}
  .fin-h p{font-style:italic;color:var(--linen-dim);margin-top:8px}
  .sky{position:relative;width:100%;aspect-ratio:16/9;background:
    radial-gradient(100% 90% at 62% 30%, #1B1610, #120F0A 70%);
    border:1px solid rgba(201,167,95,.25);border-radius:12px;margin:28px 0 10px;overflow:hidden}
  .sky::before{content:"";position:absolute;inset:0;opacity:.5;background-image:radial-gradient(rgba(237,227,205,.09) 1px, transparent 1px);
    background-size:26px 26px}
  svg.arcs{position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none}
  svg.arcs path{fill:none;stroke:var(--gold);stroke-width:.55;stroke-dasharray:.5 2.6;opacity:.6;stroke-linecap:round}
  .star{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:5px;
    background:none;border:none;cursor:pointer;z-index:2;padding:6px}
  .star .dot{width:9px;height:9px;border-radius:50%;background:var(--gold-hi);box-shadow:0 0 10px 2px rgba(239,217,160,.45)}
  .star.origin .dot{width:14px;height:14px;background:#fff;box-shadow:0 0 16px 4px rgba(239,217,160,.65)}
  .star .lb{font-family:var(--mono);font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--linen-dim);white-space:nowrap}
  .star .ct{font-family:var(--mono);font-size:8px;color:var(--gold);letter-spacing:.06em}
  .star:hover .lb,.star.active .lb{color:var(--gold-hi)}
  .star.active .dot{box-shadow:0 0 0 5px rgba(239,217,160,.15),0 0 16px 4px rgba(239,217,160,.6)}
  .skypanel{margin:10px 0 0}
  .skypanel:empty{display:none}
  .skypanel h3{font-family:var(--disp);font-weight:400;font-size:21px;margin:16px 0 12px;color:var(--gold-hi)}
  .skyhint{text-align:center;font-family:var(--mono);font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--linen-dim);margin-top:12px}

  .tl{margin:66px auto 0;max-width:640px;position:relative;padding-left:30px}
  .tl::before{content:"";position:absolute;left:5px;top:8px;bottom:8px;width:1px;background:linear-gradient(var(--gold-dim),transparent)}
  .tlh{font-family:var(--mono);font-size:9.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);margin:0 0 18px}
  .ti{display:block;width:100%;text-align:left;background:none;border:none;position:relative;padding:10px 0;cursor:pointer}
  .ti::before{content:"";position:absolute;left:-29px;top:19px;width:7px;height:7px;border-radius:50%;background:var(--gold);
    box-shadow:0 0 8px rgba(201,167,95,.5)}
  .ti .ty{font-family:var(--mono);font-size:10.5px;color:var(--gold);letter-spacing:.08em;display:block}
  .ti .tt{font-size:16.5px;color:var(--text);margin-top:2px;line-height:1.45;display:block}
  .ti:hover .tt{color:var(--linen)}

  .doors{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:760px;margin:70px auto 0}
  @media (max-width:640px){.doors{grid-template-columns:1fr}}
  .door{display:block;text-align:left;background:var(--card);border:1px solid var(--gold-dim);border-radius:14px;
    padding:26px 26px 24px;cursor:pointer;transition:border-color .15s, background .15s}
  .door:hover{border-color:var(--gold);background:var(--card2)}
  .door b{font-family:var(--disp);font-weight:400;font-size:23px;display:block;margin-bottom:7px;color:var(--gold-hi)}
  .door span{font-size:15px;color:var(--linen-dim);line-height:1.5;display:block}
  .door .go{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-top:14px;display:block}

  footer{border-top:1px solid var(--hair);margin-top:80px;padding:30px 0 90px;color:var(--linen-dim);font-size:14.5px;text-align:center}
  footer .shell{max-width:640px}
  footer b{color:var(--linen)}

  /* ============ tree view ============ */
  .treewrap{position:relative;height:calc(100svh - 56px);overflow:hidden;background:
    radial-gradient(120% 90% at 50% 0%, #1B1610, var(--ink) 70%);cursor:grab;touch-action:none}
  .treewrap.grabbing{cursor:grabbing}
  #treeCanvas{position:absolute;left:0;top:0;transform-origin:0 0;will-change:transform}
  .branchhd{position:absolute;font-family:var(--disp);font-weight:400;font-size:24px;color:var(--gold-hi);white-space:nowrap}
  .branchhd small{display:block;font-family:var(--mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--linen-dim);margin-top:4px}
  svg.wires{position:absolute;overflow:visible;pointer-events:none}
  svg.wires path{fill:none;stroke:rgba(201,167,95,.4);stroke-width:1.2}
  .tn{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:2px;text-align:center;
    background:var(--card);border:1px solid rgba(237,227,205,.14);border-radius:9px;padding:8px 7px 7px;cursor:pointer;
    transition:border-color .12s, background .12s}
  .tn:hover{border-color:var(--gold);background:var(--card2);z-index:3}
  .tn .tnn{font-size:12.5px;font-weight:500;line-height:1.18;color:var(--linen);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .tn .tny{font-family:var(--mono);font-size:8px;color:var(--linen-dim);letter-spacing:.03em;white-space:nowrap;overflow:hidden;max-width:100%}
  .tn.verified{border-top:2px solid var(--gold)}
  .tn.likely{border-top:2px solid var(--sage)}
  .tn.unconfirmed{border-top:2px dashed var(--pencil);opacity:.85}
  .tn.hot{border-color:var(--gold-hi);box-shadow:0 0 0 3px rgba(239,217,160,.22), 0 0 22px rgba(239,217,160,.25);z-index:4}
  .tnote{position:absolute;font-family:var(--mono);font-size:8.5px;line-height:1.5;letter-spacing:.02em;color:var(--linen-dim);
    border:1px dashed rgba(138,127,107,.5);border-radius:8px;padding:7px 9px;text-align:center;background:rgba(23,19,14,.6)}
  .knot2{position:absolute;font-size:12px;color:var(--gold);transform:translate(-50%,-50%);z-index:2}
  .treectl{position:absolute;right:16px;bottom:18px;z-index:5;display:flex;flex-direction:column;gap:7px}
  .tzb{width:38px;height:38px;border-radius:9px;border:1px solid var(--gold-dim);background:rgba(23,19,14,.85);color:var(--gold-hi);
    cursor:pointer;font-family:var(--mono);font-size:15px;backdrop-filter:blur(6px)}
  .tzb:hover{border-color:var(--gold)}
  .treehint{position:absolute;left:16px;bottom:18px;z-index:5;font-family:var(--mono);font-size:9px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--linen-dim);background:rgba(23,19,14,.7);padding:8px 12px;border-radius:8px;pointer-events:none}
  .treelegend{position:absolute;right:16px;top:14px;z-index:5;display:flex;gap:14px;font-family:var(--mono);font-size:9px;
    letter-spacing:.1em;text-transform:uppercase;color:var(--linen-dim);background:rgba(23,19,14,.7);padding:9px 13px;border-radius:8px}
  .treelegend i{display:inline-block;width:14px;height:3px;border-radius:2px;margin-right:6px;vertical-align:2px}

  /* ============ people index ============ */

  /* ============ drawer (the record) ============ */

  aside.drawer{position:fixed;right:0;top:0;bottom:0;z-index:70;width:min(520px,100%);overflow-y:auto;overscroll-behavior:contain;
    background:linear-gradient(#211B13,#1B1610);border-left:1px solid var(--gold-dim);
    transform:translateX(105%);transition:transform .28s cubic-bezier(.22,.9,.3,1);
    padding:22px 26px calc(44px + env(safe-area-inset-bottom))}
  aside.drawer.open{transform:none}
  .dr-top{display:flex;align-items:center;gap:8px;margin-bottom:16px}
  .recno{font-family:var(--mono);font-size:8.5px;letter-spacing:.26em;color:var(--gold);text-transform:uppercase;margin-right:auto}
  .dnav{display:flex;gap:6px}

  .dhead .pic .mono{font-size:22px}
  .drawer h3{font-family:var(--disp);font-weight:400;font-size:27px;line-height:1.08;color:var(--linen)}
  .drawer .sub{font-family:var(--mono);font-size:10px;color:var(--linen-dim);margin-top:6px;line-height:1.7;letter-spacing:.02em}
  .drawer .sub a{color:var(--gold-hi);text-decoration:none;border-bottom:1px dotted var(--gold-dim)}
  .stamp{display:inline-block;font-family:var(--mono);font-size:8.5px;letter-spacing:.2em;text-transform:uppercase;
    border:1.5px solid currentColor;padding:4px 10px;border-radius:2px;transform:rotate(-1.6deg);margin:10px 0 4px}
  .stamp.verified{color:var(--gold)} .stamp.likely{color:var(--sage)}
  .stamp.unconfirmed{color:var(--pencil);border-style:dashed;transform:rotate(1.6deg)}
  .relbar{margin:16px 0 4px}
  .relgrp{margin-bottom:11px}

  .chips{display:flex;flex-wrap:wrap;gap:7px}

  .chip .pic{width:24px;height:24px;border-width:1px}

  .keyhint{display:none;font-family:var(--mono);font-size:9px;letter-spacing:.06em;color:var(--linen-dim);margin:8px 0 4px}
  @media (min-width:760px){.keyhint{display:block}}
  .drawer dl{display:grid;grid-template-columns:98px 1fr;gap:0 16px;margin:16px 0 6px;font-size:15px;align-items:start}
  .drawer dt{font-family:var(--mono);font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);
    border-top:1px solid var(--hair);padding:12px 0}
  .drawer dd{border-top:1px solid var(--hair);padding:11px 0 13px;line-height:1.5;color:var(--text)}
  .sech{font-family:var(--mono);font-size:8.5px;letter-spacing:.26em;text-transform:uppercase;color:var(--gold);
    margin:22px 0 10px;border-top:1px solid var(--hair);padding-top:16px}
  .dmap{position:relative;margin:4px 0 14px;height:150px;overflow:hidden;border:1px solid rgba(201,167,95,.28);border-radius:6px;line-height:0;background:#0F0C08}

    filter:grayscale(.45) sepia(.38) contrast(.9) brightness(.82) saturate(.75)}

  .dmap .mappin{font-family:var(--mono);font-size:9px;letter-spacing:.05em;color:var(--gold-hi);background:rgba(23,19,14,.88);
    border:1px solid var(--gold-dim);border-radius:4px;padding:4px 9px;max-width:92%}

  .simg img{display:block;width:100%;filter:sepia(.28) saturate(.82) brightness(.92)}
  .simg figcaption{font-family:var(--mono);font-size:9px;letter-spacing:.03em;color:var(--linen-dim);padding:8px 3px 2px;line-height:1.55}
  .story p{margin-bottom:14px;font-size:17px;font-weight:400;line-height:1.68;color:var(--text)}
  .story p:first-of-type::first-letter{font-family:var(--disp);font-size:44px;line-height:.85;float:left;padding:5px 8px 0 0;color:var(--gold-hi)}
  .gapbox{margin:16px 0;border:1px dashed rgba(138,127,107,.55);padding:13px 15px;font-size:14px;color:var(--linen-dim);
    background:rgba(138,127,107,.07);border-radius:4px;line-height:1.5}
  .gapbox b{font-family:var(--mono);font-size:8.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--pencil);display:block;margin-bottom:5px}

  .srcs li{padding-left:16px;position:relative;font-size:13.5px;color:var(--linen-dim);margin-bottom:6px;line-height:1.5}
  .srcs li::before{content:"§";position:absolute;left:0;color:var(--gold)}
  .srcs a{color:var(--linen-dim);text-decoration:none;border-bottom:1px dotted var(--gold-dim)}

  .addbtn:hover{background:rgba(201,167,95,.1);border-color:var(--gold)}

  .gtoast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(16px);z-index:90;max-width:360px;width:calc(100% - 32px);
    background:#0F0C08;color:var(--linen);border:1px solid var(--gold-dim);border-radius:10px;padding:13px 16px;font-size:14.5px;line-height:1.5;

  .gtoast b{display:block;font-family:var(--mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:5px}

  /* contribute sheet */
  aside.csheet{position:fixed;left:50%;top:50%;z-index:80;width:min(460px,calc(100% - 28px));max-height:88vh;overflow-y:auto;
    background:#211B13;border:1px solid var(--gold-dim);border-radius:16px;transform:translate(-50%,-50%) scale(.96);

  .csheet .close, .drawer .close{position:absolute;top:16px;right:16px;width:30px;height:30px;border:1px solid var(--hair);
    background:none;font-family:var(--mono);font-size:11px;cursor:pointer;color:var(--linen-dim);border-radius:50%}
  .csheet .close:hover, .drawer .close:hover{color:var(--gold-hi);border-color:var(--gold-dim)}
  .csheet h3{font-family:var(--disp);font-weight:400;font-size:23px;margin:2px 0 8px}
  .muted{font-size:14.5px;color:var(--linen-dim);line-height:1.5;margin-bottom:16px}
  .field{display:block;margin-bottom:12px}
  .field span{font-family:var(--mono);font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:5px}
  .field input,.field textarea{width:100%;border:1px solid var(--hair);background:rgba(237,227,205,.05);border-radius:6px;
    font-family:var(--serif);font-size:15px;padding:10px 12px;color:var(--linen)}
  .field textarea{min-height:96px;resize:vertical}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--gold-dim)}
  .sendbtn{width:100%;border:none;background:var(--gold);color:#171106;font-family:var(--mono);font-size:11px;font-weight:500;
    letter-spacing:.12em;padding:14px;border-radius:8px;cursor:pointer;text-transform:uppercase}
  .sendbtn:hover{background:var(--gold-hi)}

  /* reveal on scroll */
  .rv{opacity:0;transform:translateY(16px);transition:opacity .6s ease, transform .6s ease}
  .rv.in{opacity:1;transform:none}

  @media (max-width:760px){
    .toprow{gap:8px}
    .navtabs{margin-left:0}
    .ntab{padding:8px 7px;font-size:9.5px;letter-spacing:.1em}
    .topsearch{flex:1 1 90px}
    .wordmark em{display:none}
    .wordmark{font-size:15px}
    .chapter{padding:58px 0 22px 42px}
    .chapter::before{left:13px}
    .tick,.chnum{left:13px}
    .tick{top:70px}
    .herostats div{padding:10px 14px}
    aside.drawer{width:100%;border-left:none}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none!important;animation:none!important}
    html{scroll-behavior:auto}
    .rv{opacity:1;transform:none}
  }
</style>
</head>
<body>

<div class="top">
  <div class="shell toprow">
    <button class="wordmark" id="homeBtn" title="Back to the beginning"><span class="wm-t">The Gottdank Tree</span><em>est. Isterik</em></button>
    <nav class="navtabs" aria-label="Views">
      <button class="ntab on" data-view="saga">The Saga</button>
      <button class="ntab" data-view="tree">The Tree</button>
      <button class="ntab" data-view="people">Everyone</button>
    </nav>
    <div class="topsearch">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="findBox" type="search" placeholder="find a name…" aria-label="Find a name" autocomplete="off">

    </div>
    <button class="cbtn" id="contribBtn" title="Add a photo, story, or correction" aria-label="Contribute"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5Z"/></svg></button>
  </div>
</div>

<main>
  <section class="view" id="view-saga"></section>
  <section class="view" id="view-tree" hidden>
    <div class="treewrap" id="treeVp">
      <div id="treeCanvas"></div>
      <div class="treelegend"><span><i style="background:var(--gold)"></i>verified</span><span><i style="background:var(--sage)"></i>likely</span><span><i style="background:var(--pencil)"></i>pencil</span></div>
      <div class="treehint">drag to pan · scroll to zoom · tap a name</div>
      <div class="treectl">
        <button class="tzb" id="tzIn" aria-label="Zoom in">＋</button>
        <button class="tzb" id="tzOut" aria-label="Zoom out">−</button>
        <button class="tzb" id="tzFit" aria-label="Fit tree" style="font-size:11px">fit</button>
      </div>
    </div>

</main>

<div class="scrim" id="scrim"></div>
<div class="gtoast" id="gToast"></div>

<aside class="drawer" id="drawer" role="dialog" aria-modal="true" aria-label="Family record">
  <div class="dr-top">
    <span class="recno" id="dRec">Record</span>
    <div class="dnav">
      <button class="dnb" id="dPrev" title="Previous record">←</button>
      <button class="dnb" id="dNext" title="Next record">→</button>
      <button class="dnb" id="dClose" title="Close">✕</button>
    </div>
  </div>
  <div class="dhead"><span class="pic" id="dLock"></span><div><h3 id="dTitle"></h3><div class="sub" id="dSub"></div></div></div>
  <span class="stamp" id="dStamp"></span>
  <div class="keyhint">← → siblings · ↑ parent · ↓ child · esc close</div>

  <div class="sech" id="dMapLbl" hidden>Where they lived</div>
  <div class="dmap" id="dMap" hidden></div>
  <div class="sech">Their story</div>

</aside>

<aside class="csheet" id="csheet" role="dialog" aria-modal="true" aria-label="Contribute">

  <span class="recno">Contribute</span>
  <h3 id="cTitle">Add to the tree</h3>
  <p class="muted">Spotted a mistake, have a photo, or remember a story? Send it over and it gets added.</p>
  <label class="field"><span>Family code</span><input id="cCode" placeholder="ask for the code"></label>
  <label class="field"><span>Your name</span><input id="cName" placeholder="who's contributing"></label>
  <label class="field"><span>Photo or memory</span><textarea id="cMsg" placeholder="a correction, a story, who's missing… (attach photos to the email)"></textarea></label>
  <button class="sendbtn" id="cSend">Send to the keeper of the tree</button>
</aside>

<script src="family.js"></script>
<script>
/* photos: id -> face url. story images: id -> {src,cap}. filled as we get them. */
const PHOTOS = {};
const STORY_IMG = {
  thename:{src:"img/galicia-1914.jpg",cap:"Galicia (shaded red) — the family's corner of old Austria-Hungary, now split between southeast Poland and western Ukraine. Map: Wikimedia Commons."},
  gittel:{src:"img/ustrzyki-view.jpg",cap:"Ustrzyki Dolne today — the town the Jews called Isterik — in its Bieszczady valley. Photo: Wikimedia Commons."},
  charles:{src:"img/immigrant-boat.jpg",cap:"An 'immigrant boat' ferrying new arrivals across New York harbor, c.1900 — the crossing Charles's generation made. Library of Congress."},
  phyllis:{src:"img/coney-boardwalk.jpg",cap:"The Coney Island boardwalk in its heyday — the world by Phyllis's door in Brooklyn. Library of Congress."},
  estherO:{src:"img/vaudeville-1927.jpg",cap:"A vaudeville stage and chorus line, 1927 — the touring world Esther and Jeanne played as 'the Gordon sisters.' MOHAI / Wikimedia Commons."},
  yisroel:{src:"img/rukhl-avrom.jpg",cap:"One of only four surviving photographs of Rukhl, Israel's first wife. She and their small son Avrom were murdered in Poland. From Miriam Isaacs's memoir 'Four Photographs of Rukhl,' Lilith Magazine."},
  israel:{src:"img/rukhl-avrom.jpg",cap:"One of only four surviving photographs of Rukhl, Israel's first wife. She and their small son Avrom were murdered in Poland. From Miriam Isaacs's memoir 'Four Photographs of Rukhl,' Lilith Magazine."},
  miriamDC:{src:"img/dp-camp.jpg",cap:"Children at a displaced-persons camp in occupied Germany, late 1940s — the world Miriam was born into in 1946. Photo: Wikimedia Commons."},
  bernhard:{src:"img/maxwell-street.jpg",cap:"The Maxwell Street market, Chicago — 'the Ellis Island of the Midwest,' the world around Bernhard's shop. Curt Teich postcard, Newberry Library / Wikimedia Commons."},
  miriam:{src:"img/belzec-memorial.jpg",cap:"The memorial at Bełżec — burned slag covering the ground where the camp stood. Isterik's Jews were deported here in September 1942. Photo: Camilluccia, CC BY-SA 4.0, Wikimedia Commons."},
  lostKids:{src:"img/sources/grave-151784528.jpg",cap:"Lynn Jay's stone at New Montefiore, in the Mandel Family Circle. The top reads simply 'DAUGHTER.' October 9, 1950 – May 31, 1953."},
  davidO:{src:"img/sources/grave-256993440.jpg",cap:"David Gottdank's red granite stone, Jewish Memorial Gardens, Ottawa — 'our dear and beloved father,' died 7th Elul 5682 (1922)."},
  rachelO:{src:"img/sources/grave-256993443.jpg",cap:"Rachel Leah Gottdank's stone, Ottawa — 'our dear mother,' died March 20, 1938, aged 56. The base carries the family name."}
};

/* family structure */
const U=(people,children)=>({people,children:children||null});
const N=(note,children)=>({note,children:children||null});
const TREES = {
  main:{label:"The Galician line", sub:"Gittel of Isterik → today", roots:[
    U(["gittel","coleman"],[
      U(["charles","fannieK"],[
        U(["lillian"]), U(["helenS"]),
        U(["jerry","mollyR"],[ U(["franklin","wendy"]), U(["allan"]), U(["lindaJ"]) ]),
        U(["milton","phyllis"],[
          U(["brian","laurie"],[ U(["cole"]), U(["bridget"]), U(["annalyn"]) ]),
          U(["dale","nancy"],[ U(["jordan"]), U(["jessica"]) ]),
          U(["lostKids"])
        ])
      ]),
      U(["bernhard","bertha"],[ U(["ruthM"]), U(["kateB"]), U(["twinsHF"]), U(["mildredH"]) ]),
      U(["pauline"]), U(["claraK"]),
      U(["unknownB"])
    ])
  ]},
  ottawa:{label:"London → Ottawa", sub:"a separate Gottdank family", roots:[
    U(["davidO","rachelO"],[
      U(["estherO"]), U(["jeanneO"]), U(["sasO"]),
      U(["arthur","violet"],[
        U(["bobG"]), U(["davidGreely"]), U(["kimG"]), U(["tinaG"]),
        N("Grandchildren · parents per the obituary",[ U(["danny","celia"]), U(["steven"]), U(["grandkidsCA"]), U(["torontoMisc"]) ])
      ])
    ])
  ]},
  krakow:{label:"Isterik — the survivor's line", sub:"Vaytman-Gottdank · joined by marriage", roots:[
    U(["abrahamW","miriam"],[ U(["yisroel"],[ U(["miriamDC"]) ]), U(["joseph_g"]) ])
  ]},
  newyork:{label:"New York — unplaced", sub:"likely the unknown brother's people", roots:[
    U(["nyimm"],[ U(["nygen"]), U(["lawrence","beatrice"],[ U(["josephP","ellenP"],[ U(["heather"]), U(["tracy"]) ]) ]), U(["roseEC"],[ U(["irving"]) ]) ])
  ]},
  diaspora:{label:"West Coast, NJ & Brazil", sub:"share the name; not yet placed", roots:[
    U(["sidney","linda"]), U(["alex"],[ U(["marilyn"]), U(["adam"]) ]), U(["michaelNJ"]), U(["mariza"])
  ]}
};

/* ---------- helpers ---------- */
function clean(n){return n.replace(/\(.*?\)/g,'').replace(/[„“”"'‚].*?[„“”"'‚]/g,'').replace(/\s+/g,' ').trim();}
function initials(n){let w=clean(n).split(' ').filter(Boolean);let a=(w[0]||n)[0]||'?';let b=w.length>1?w[w.length-1][0]:'';return (a+b).toUpperCase();}
function confClass(c){return c==='verified'?'verified':c==='likely'?'likely':'unconfirmed';}
function disp(n){let c=clean(n)||n;let w=c.split(' ');if(w.length>1&&w[w.length-1]==='Gottdank')w.pop();return w.join(' ');}
function esc(s){return (s+'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function pic(id,cls){const p=P[id],ph=PHOTOS[id];return `<span class="pic ${confClass(p.conf)} ${cls||''}">${ph?`<img src="${ph}" alt="">`:`<span class="mono">${initials(p.name)}</span>`}</span>`;}
function cameo(id){const p=P[id];return `<button class="cameo ${confClass(p.conf)}" data-id="${id}">${pic(id)}<span class="cx"><span class="cn">${esc(disp(p.name))}</span><span class="cm">${esc(p.years)}</span><span class="cm">${esc(p.rel)}</span></span></button>`;}

const GLOSSARY={
  "displaced-persons camp":"A postwar camp (1945 to the early 1950s) that housed Holocaust survivors and refugees who had no home to return to.",
  "DP camp":"A displaced-persons camp — postwar housing for Holocaust survivors and refugees.",
  "Galicia":"A historic region of the Austro-Hungarian Empire, now split between southeast Poland and western Ukraine. It had a large Jewish population before WWII.",
  "shtetl":"A small Jewish market town in Eastern Europe.",
  "Ashkenazi":"Jews of Central and Eastern European descent.",
  "Yizkor book":"A memorial book written by survivors to record a destroyed Jewish town and name its dead.",
  "aliyah":"Immigrating to Israel.",
  "Shoah":"Another name for the Holocaust.",
  "vaudeville":"Early-1900s North American variety theater — music and comedy acts that toured from town to town.",
  "matrilineal":"Passed down through the mother's line.",
  "matriarch":"The female head of a family line."
};
function glossify(text){
  let out=text;
  for(const term of Object.keys(GLOSSARY)){
    const re=new RegExp('(?<![\\w-])('+term+')(?![\\w-])','i');
    if(re.test(out)) out=out.replace(re,'<button class="gloss" data-def="'+GLOSSARY[term].replace(/"/g,'&quot;')+'">$1</button>');
  }
  return out;
}
function mapQuery(seg){
  let q=seg; const m=q.match(/\(([^)]+)\)/);
  q = m ? m[1] : q.replace(/\([^)]*\)/g,'');
  q = q.replace(/\bthe Isterik region\b/ig,'Ustrzyki Dolne').replace(/\bIsterik\b/ig,'Ustrzyki Dolne');
  q = q.replace(/,?\s*Galicia\b/ig,', Poland').replace(/\bDP camp\b/ig,'');
  q = q.replace(/\s{2,}/g,' ').replace(/^[,\s]+|[,\s]+$/g,'').trim();
  return q||seg;
}
function mapUrl(seg){return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(mapQuery(seg));}
function placeSegs(place){return place.split(/\s*(?:→|·|;)\s*/).filter(Boolean);}
function placeHtml(place){return placeSegs(place).map(seg=>'<a class="placelink" href="'+mapUrl(seg)+'" target="_blank" rel="noopener">'+esc(seg)+'</a>').join(' → ');}

    [/metrópoles|metropoles|universo paralello/,L+'metropoles.png'],[/delaware beach life/,L+'delawarebeachlife.png'],

/* ---------- relationship index ---------- */
const REL={};
function ensureRel(id){return REL[id]||(REL[id]={spouse:null,parents:[],siblings:[],children:[]});}
function primOf(u){return u.note?null:u.people[0];}
function walkRel(u,parent){
  if(!u.note){
    const a=u.people[0], b=u.people[1]||null;
    if(b){ensureRel(a).spouse=b;ensureRel(b).spouse=a;ensureRel(a).couple=[a,b];ensureRel(b).couple=[a,b];}
    const kids=(u.children||[]).map(primOf).filter(Boolean);
    ensureRel(a).children=kids; if(b)ensureRel(b).children=kids;
    if(parent&&!parent.note)ensureRel(a).parents=parent.people.slice();
  }
  (u.children||[]).forEach(c=>walkRel(c,u));
  if(u.children){const prims=u.children.map(primOf).filter(Boolean);
    u.children.forEach(cu=>{if(!cu.note){const me=cu.people[0];ensureRel(me).siblings=prims.filter(x=>x!==me);ensureRel(me).sibGroup=prims;}});}
}
Object.values(TREES).forEach(t=>t.roots.forEach(r=>walkRel(r,null)));

/* ---------- tree layout ---------- */
const NW=118, NH=56, CGAP=10, GAPX=18, GAPY=54, KNOT=14;
function unitSelfW(u){ if(u.note) return 170; return u.people.length===2 ? NW*2+CGAP+KNOT : NW; }
function measure(u){
  const kids=u.children||[];
  kids.forEach(measure);
  const kw=kids.length?kids.reduce((a,k)=>a+k._w,0)+GAPX*(kids.length-1):0;
  u._selfW=unitSelfW(u);
  u._w=Math.max(u._selfW, kw);
  return u._w;
}
function place(u,x,y,out){
  const kids=u.children||[];
  let cx=x+(u._w-u._selfW)/2;
  u._x=cx; u._y=y;
  out.push(u);
  if(kids.length){
    const kw=kids.reduce((a,k)=>a+k._w,0)+GAPX*(kids.length-1);
    let kx=x+(u._w-kw)/2;
    kids.forEach(k=>{place(k,kx,y+NH+GAPY,out);kx+=k._w+GAPX;});
  }
}
function unitCenter(u){return u._x+u._selfW/2;}
function buildTree(){
  const canvas=document.getElementById('treeCanvas');
  let html='', wires='', yOff=30, maxW=0;
  const BR_GAP=120, HDR=74;
  Object.values(TREES).forEach(t=>{
    /* header */
    html+=`<div class="branchhd" style="left:30px;top:${yOff}px">${esc(t.label)}<small>${esc(t.sub)}</small></div>`;
    let y=yOff+HDR;
    let x=30;
    let branchBottom=y;
    t.roots.forEach(r=>{
      measure(r);
      const units=[]; place(r,x,y,units);
      units.forEach(u=>{
        const uy=u._y;
        branchBottom=Math.max(branchBottom,uy+NH);
        if(u.note){
          html+=`<div class="tnote" style="left:${u._x}px;top:${uy}px;width:${u._selfW}px">${esc(u.note)}</div>`;
        }else{
          u.people.forEach((pid,i)=>{
            if(!P[pid])return;
            const px=u._x+i*(NW+CGAP+KNOT);
            html+=`<button class="tn ${confClass(P[pid].conf)}" data-id="${pid}" id="tn-${pid}" style="left:${px}px;top:${uy}px;width:${NW}px;min-height:${NH}px"><span class="tnn">${esc(disp(P[pid].name))}</span><span class="tny">${esc(P[pid].years)}</span></button>`;
          });
          if(u.people.length===2) html+=`<span class="knot2" style="left:${u._x+NW+ (CGAP+KNOT)/2}px;top:${uy+NH/2}px">⚭</span>`;
        }
        const kids=u.children||[];
        if(kids.length){
          const pcx=unitCenter(u), pby=uy+NH, busy=pby+GAPY/2;
          wires+=`<path d="M${pcx} ${pby} V${busy}"/>`;
          const cs=kids.map(k=>({x:unitCenter(k),y:k._y}));
          const minx=Math.min(...cs.map(c=>c.x)), maxx=Math.max(...cs.map(c=>c.x));
          if(kids.length>1) wires+=`<path d="M${minx} ${busy} H${maxx}"/>`;
          cs.forEach(c=>{wires+=`<path d="M${c.x} ${busy} V${c.y}"/>`;});
          branchBottom=Math.max(branchBottom,...kids.map(k=>k._y+NH));
        }
      });
      maxW=Math.max(maxW,x+r._w);
      x+=r._w+GAPX*2;
    });
    /* find true bottom of this branch group */
    yOff=deepBottom(t.roots,yOff+HDR)+BR_GAP;
  });
  function deepBottom(roots,base){
    let b=base;
    const walk=u=>{b=Math.max(b,u._y+NH);(u.children||[]).forEach(walk);};
    roots.forEach(walk);
    return b;
  }
  const H=yOff, W=maxW+60;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  canvas.innerHTML=`<svg class="wires" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${wires}</svg>`+html;
  canvas.dataset.w=W; canvas.dataset.h=H;
}

/* pan / zoom */
const vp=document.getElementById('treeVp'), canvas=document.getElementById('treeCanvas');
let tx=0, ty=0, ts=1;
function applyT(){canvas.style.transform=`translate(${tx}px,${ty}px) scale(${ts})`;}
function fitTree(){
  const W=+canvas.dataset.w||1, r=vp.getBoundingClientRect();
  ts=Math.min(1.1, Math.max(.22,(r.width-24)/W));
  tx=(r.width-W*ts)/2; ty=14; applyT();
}
function zoomAt(f,cx,cy){
  const ns=Math.min(2.2,Math.max(.18,ts*f));
  tx=cx-(cx-tx)*(ns/ts); ty=cy-(cy-ty)*(ns/ts); ts=ns; applyT();
}
vp.addEventListener('wheel',e=>{e.preventDefault();
  const r=vp.getBoundingClientRect();
  zoomAt(Math.exp(-e.deltaY*0.0016), e.clientX-r.left, e.clientY-r.top);
},{passive:false});
let drag=null; const pts=new Map();
vp.addEventListener('pointerdown',e=>{
  pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pts.size===1){drag={x:e.clientX,y:e.clientY,moved:false};vp.classList.add('grabbing');}
  vp.setPointerCapture(e.pointerId);
});
vp.addEventListener('pointermove',e=>{
  if(!pts.has(e.pointerId))return;
  const prev=pts.get(e.pointerId); pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pts.size===2){
    const [a,b]=[...pts.values()];
    const other=[...pts.entries()].find(([id])=>id!==e.pointerId)[1];
    const d1=Math.hypot(e.clientX-other.x,e.clientY-other.y);
    const d0=Math.hypot(prev.x-other.x,prev.y-other.y);
    if(d0>0){const r=vp.getBoundingClientRect();
      zoomAt(d1/d0,(e.clientX+other.x)/2-r.left,(e.clientY+other.y)/2-r.top);}
  }else if(drag){
    const dx=e.clientX-drag.x, dy=e.clientY-drag.y;
    if(Math.abs(dx)+Math.abs(dy)>3)drag.moved=true;
    tx+=dx;ty+=dy;drag.x=e.clientX;drag.y=e.clientY;applyT();
  }
});
function endPt(e){
  const wasTap=drag&&!drag.moved&&pts.size===1&&e.type==='pointerup';
  pts.delete(e.pointerId);
  if(pts.size===0){vp.classList.remove('grabbing');
    if(drag&&drag.moved){suppressClick=true;setTimeout(()=>suppressClick=false,60);}
    drag=null;}
  /* pointer capture retargets clicks to the viewport, so resolve taps by hit-test */
  if(wasTap){const el=document.elementFromPoint(e.clientX,e.clientY);
    const b=el&&el.closest('[data-id]'); if(b)openPerson(b.dataset.id);}
}
vp.addEventListener('pointerup',endPt);vp.addEventListener('pointercancel',endPt);
let suppressClick=false;
document.getElementById('tzIn').onclick=()=>{const r=vp.getBoundingClientRect();zoomAt(1.3,r.width/2,r.height/2);};
document.getElementById('tzOut').onclick=()=>{const r=vp.getBoundingClientRect();zoomAt(1/1.3,r.width/2,r.height/2);};
document.getElementById('tzFit').onclick=fitTree;
function centerOn(id){
  const n=document.getElementById('tn-'+id); if(!n)return;
  const r=vp.getBoundingClientRect();
  ts=Math.max(ts,.85);
  const nx=parseFloat(n.style.left)+NW/2, ny=parseFloat(n.style.top)+NH/2;
  tx=r.width/2-nx*ts; ty=r.height/2.6-ny*ts; applyT();
  document.querySelectorAll('.tn.hot').forEach(x=>x.classList.remove('hot'));
  n.classList.add('hot');
}

/* ---------- people index ---------- */
function renderPeople(){
  const inTree=new Set();
  const collect=u=>{if(!u.note)u.people.forEach(p=>inTree.add(p));(u.children||[]).forEach(collect);};
  Object.values(TREES).forEach(t=>t.roots.forEach(collect));
  let h=`<div class="shell"><h2>Everyone in the record</h2>
  <p class="sub">${Object.keys(P).length-1} lives across five branches — tap anyone to open their record.</p>`;
  Object.values(TREES).forEach(t=>{
    const ids=[]; const c2=u=>{if(!u.note)u.people.forEach(p=>{if(P[p])ids.push(p)});(u.children||[]).forEach(c2);};
    t.roots.forEach(c2);
    h+=`<div class="pgroup"><div class="grouplbl">${esc(t.label)} · ${ids.length}</div><div class="rail" style="display:grid">${ids.map(cameo).join('')}</div></div>`;
  });
  const loose=Object.keys(P).filter(id=>id!=='thename'&&!inTree.has(id));
  if(loose.length) h+=`<div class="pgroup"><div class="grouplbl">Companion records</div><div class="rail" style="display:grid">${loose.map(cameo).join('')}</div></div>`;
  h+=`<div class="pgroup"><div class="grouplbl">The name itself</div><div class="rail" style="display:grid">${cameo('thename')}</div></div></div>`;
  return h;
}

/* ---------- views ---------- */
const VIEWS=['saga','tree','people'];
let curView='saga', treeBuilt=false, sagaBuilt=false, peopleBuilt=false;
function setView(v,push){
  if(!VIEWS.includes(v))v='saga';
  curView=v;
  document.querySelectorAll('.view').forEach(x=>x.hidden=true);
  document.querySelectorAll('.ntab').forEach(t=>t.classList.toggle('on',t.dataset.view===v));
  const el=document.getElementById('view-'+v); el.hidden=false;
  if(v==='saga'&&!sagaBuilt){el.innerHTML=renderSaga();sagaBuilt=true;wireReveal();}
  if(v==='tree'&&!treeBuilt){buildTree();fitTree();treeBuilt=true;}
  if(v==='people'&&!peopleBuilt){el.innerHTML=renderPeople();peopleBuilt=true;}
  if(v!=='tree')window.scrollTo({top:0});
  if(push!==false){try{history.replaceState(null,'',v==='saga'?location.pathname:'#'+v);}catch(e){}}
}
function wireReveal(){
  if(matchMedia('(prefers-reduced-motion: reduce)').matches){
    document.querySelectorAll('.rv').forEach(x=>x.classList.add('in'));return;
  }
  const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}}),{threshold:.12});
  document.querySelectorAll('.rv').forEach(x=>io.observe(x));
}

/* ---------- drawer ---------- */
const scrim=document.getElementById('scrim'), drawer=document.getElementById('drawer');
let curId=null;
const ORDER=(()=>{const seen=new Set(),o=[];
  const add=id=>{if(P[id]&&!seen.has(id)){seen.add(id);o.push(id);}};
  add('thename');
  CHAPTERS.forEach(c=>(c.groups||[]).forEach(g=>g.ids.forEach(add)));
  Object.keys(P).forEach(add);
  return o;})();
function relChips(id){
  const r=REL[id]; if(!r)return '';
  const grp=(label,ids)=>ids&&ids.length?`<div class="relgrp"><em>${label}</em><div class="chips">${ids.filter(x=>P[x]).map(x=>`<button class="chip" data-id="${x}">${pic(x)}${esc(disp(P[x].name))}</button>`).join('')}</div></div>`:'';
  return grp('Parents',r.parents)+grp('Spouse',r.spouse?[r.spouse]:[])+grp('Children',r.children)+grp('Brothers & sisters',r.siblings);
}
function openPerson(id){
  const p=P[id]; if(!p)return;
  curId=id;
  document.getElementById('dRec').textContent='Record · '+(ORDER.indexOf(id)+1)+' of '+ORDER.length;
  document.getElementById('dLock').outerHTML=pic(id).replace('class="pic','id="dLock" class="pic');
  document.getElementById('dTitle').textContent=p.name;
  document.getElementById('dSub').innerHTML=esc(p.years)+' · '+placeHtml(p.place)+'<br>'+esc(p.rel);
  const st=document.getElementById('dStamp');
  st.textContent=p.conf==='unconfirmed'?'pencil — unconfirmed':p.conf;
  st.className='stamp '+confClass(p.conf);
  document.getElementById('dRels').innerHTML=relChips(id);
  document.getElementById('dFacts').innerHTML=Object.entries(p.facts).map(([k,v])=>`<dt>${esc(k)}</dt><dd>${glossify(v+'')}</dd>`).join('');
  const dMap=document.getElementById('dMap'),pp=placeSegs(p.place)[0]||'';
  document.getElementById('dMapLbl').hidden=!pp;
  if(pp){dMap.hidden=false;dMap.innerHTML='<iframe loading="lazy" referrerpolicy="no-referrer-when-downgrade" src="https://maps.google.com/maps?q='+encodeURIComponent(mapQuery(pp))+'&output=embed"></iframe><a class="mapover" href="'+mapUrl(pp)+'" target="_blank" rel="noopener" aria-label="Open in Google Maps"><span class="mappin">'+esc(pp)+'&nbsp;↗</span></a>';}
  else{dMap.hidden=true;dMap.innerHTML='';}
  const si=STORY_IMG[id];
  const fig=si?`<figure class="simg"><img src="${si.src}" alt=""><figcaption>${si.cap}</figcaption></figure>`:'';
  document.getElementById('dStory').innerHTML=fig+p.story.map(s=>`<p>${glossify(s)}</p>`).join('');
  const g=document.getElementById('dGap');
  if(p.gap){g.hidden=false;document.getElementById('dGapText').textContent=p.gap;}else g.hidden=true;
  document.getElementById('dSrc').innerHTML=p.src.map(s=>{const u=srcLink(s);return '<li>'+(u?'<a href="'+u+'" target="_blank" rel="noopener">'+esc(s)+'</a>':esc(s))+'</li>';}).join('');
  document.getElementById('dAdd').onclick=()=>openContrib(id);
  const loc=document.getElementById('dLocate');
  loc.style.display=document.getElementById('tn-'+id)||!treeBuilt?'':'none';
  loc.onclick=()=>{closeDrawer();setView('tree');requestAnimationFrame(()=>{if(!document.getElementById('tn-'+id)){}else centerOn(id);});};
  drawer.classList.add('open');scrim.classList.add('open');
  drawer.scrollTop=0;
  try{history.replaceState(null,'','#'+id);}catch(e){}
}
function closeDrawer(){drawer.classList.remove('open');
  if(!csheet.classList.contains('open'))scrim.classList.remove('open');
  try{history.replaceState(null,'',curView==='saga'?location.pathname:'#'+curView);}catch(e){}
  curId=null;}
document.getElementById('dClose').onclick=closeDrawer;
document.getElementById('dPrev').onclick=()=>{const i=ORDER.indexOf(curId);if(i>0)openPerson(ORDER[i-1]);};
document.getElementById('dNext').onclick=()=>{const i=ORDER.indexOf(curId);if(i<ORDER.length-1)openPerson(ORDER[i+1]);};

/* ---------- contribute ---------- */
const csheet=document.getElementById('csheet');
let contribTarget=null;
function openContrib(id){contribTarget=id||null;
  document.getElementById('cTitle').textContent=id?`Add to ${clean(P[id].name)}'s record`:'Add to the tree';
  csheet.classList.add('open');scrim.classList.add('open');}
function closeContrib(){csheet.classList.remove('open');
  if(!drawer.classList.contains('open'))scrim.classList.remove('open');}
document.getElementById('cClose').onclick=closeContrib;
document.getElementById('contribBtn').onclick=()=>openContrib(null);
document.getElementById('cSend').onclick=()=>{
  const code=document.getElementById('cCode').value.trim(),nm=document.getElementById('cName').value.trim(),msg=document.getElementById('cMsg').value.trim();
  const who=contribTarget?` about ${P[contribTarget].name}`:'';
  const body=encodeURIComponent(`From: ${nm||'(name)'}\nFamily code: ${code||'(none)'}\n\nContribution${who}:\n${msg}\n\n(Photos: please attach them to this email.)`);
  location.href=`mailto:colegottdank@gmail.com?subject=${encodeURIComponent('Gottdank tree — a contribution'+who)}&body=${body}`;
};
scrim.addEventListener('click',()=>{closeContrib();closeDrawer();});

/* ---------- global clicks ---------- */
document.addEventListener('click',e=>{
  const v=e.target.closest('[data-view]');
  if(v){e.preventDefault();closeDrawer();setView(v.dataset.view);return;}
  const b=e.target.closest('[data-id]');
  if(b){if(suppressClick)return;openPerson(b.dataset.id);return;}
});
document.getElementById('homeBtn').onclick=()=>{closeDrawer();setView('saga');window.scrollTo({top:0,behavior:'smooth'});};
document.getElementById('view-saga').addEventListener('click',e=>{
  const d=e.target.closest('.door'); if(d&&d.id==='doorContrib')openContrib(null);
  const s=e.target.closest('.star'); if(!s)return;
  const pl=PLACES.find(x=>x.k===s.dataset.place); if(!pl)return;
  document.querySelectorAll('.star').forEach(x=>x.classList.toggle('active',x===s));
  document.getElementById('skyHint').style.display='none';
  document.getElementById('skypanel').innerHTML=`<h3>${pl.lbl} — ${peopleAt(pl).length}</h3><div class="rail" style="display:grid">${peopleAt(pl).map(cameo).join('')}</div>`;
});

/* glossary toast */
const gToast=document.getElementById('gToast');let gtTimer;
document.addEventListener('click',e=>{const g=e.target.closest('.gloss');
  if(g){e.stopPropagation();gToast.innerHTML='<b>'+esc(g.textContent)+'</b>'+esc(g.dataset.def);gToast.classList.add('show');clearTimeout(gtTimer);gtTimer=setTimeout(()=>gToast.classList.remove('show'),6000);return;}
  if(!e.target.closest('.gtoast'))gToast.classList.remove('show');});

/* keyboard */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeContrib();closeDrawer();return;}
  if(e.target.matches('input,textarea'))return;
  if(!curId)return;
  const r=REL[curId]; if(!r)return;
  if(e.key==='ArrowLeft'||e.key==='ArrowRight'){e.preventDefault();
    const g=r.sibGroup||[],i=g.indexOf(curId),t=g[i+(e.key==='ArrowRight'?1:-1)];if(t)openPerson(t);}
  else if(e.key==='ArrowUp'){e.preventDefault();if(r.parents[0])openPerson(r.parents[0]);}
  else if(e.key==='ArrowDown'){e.preventDefault();if(r.children[0])openPerson(r.children[0]);}
});

/* search */
const findBox=document.getElementById('findBox'),findPop=document.getElementById('findPop');
findBox.addEventListener('input',()=>{const q=findBox.value.trim().toLowerCase();
  if(!q){findPop.hidden=true;findPop.innerHTML='';return;}
  const hits=Object.keys(P).filter(id=>clean(P[id].name).toLowerCase().includes(q)).slice(0,8);
  findPop.hidden=!hits.length;
  findPop.innerHTML=hits.map(id=>'<button data-id="'+id+'"><span class="fpn">'+esc(disp(P[id].name))+'</span><span class="fpm">'+esc(P[id].years)+'</span></button>').join('');
});
findPop.addEventListener('click',e=>{const b=e.target.closest('button[data-id]');if(b){e.stopPropagation();findBox.value='';findPop.hidden=true;}});
document.addEventListener('click',e=>{if(!e.target.closest('.topsearch'))findPop.hidden=true;});

/* resize refits tree if visible */
addEventListener('resize',()=>{if(curView==='tree'&&treeBuilt)fitTree();});

/* ---------- start ---------- */
setView('saga',false);
const _h=location.hash?decodeURIComponent(location.hash.slice(1)):'';
if(_h==='tree'||_h==='people')setView(_h,false);
else if(P[_h])openPerson(_h);
</script>
